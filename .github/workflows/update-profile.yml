name: Update profile README

on:
  workflow_dispatch:
  schedule:
    - cron: '18 21 * * 0'

permissions:
  contents: write

concurrency:
  group: update-profile-readme
  cancel-in-progress: false

jobs:
  update-recent-projects:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Test updater
        run: node --test test/update-recent-projects.test.mjs

      - name: Update recent projects
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: CHENJIAMIAN
          PROFILE_REPO: CHENJIAMIAN
          RECENT_PROJECT_MONTHS: '3'
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_HTTP_REFERER: https://cherry-ai.com
          LLM_X_TITLE: Cherry Studio
        run: node scripts/update-recent-projects.mjs

      - name: Commit changes
        run: |
          if git diff --quiet -- README.md; then
            echo "README.md is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: 自动更新近期项目"
          git push
